<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="editor">
        <h1>Resume Builder</h1>
        <form id="resume-form">
          <label>Full Name <input name="name" placeholder="Jane Doe" required /></label>
          <label>Email <input name="email" type="email" placeholder="jane@example.com" required /></label>
          <label>Phone <input name="phone" placeholder="(555) 555-5555" /></label>
          <label>Summary
            <textarea name="summary" rows="4" placeholder="Results-driven professional..."></textarea>
          </label>
          <label>Skills (comma separated)
            <input name="skills" placeholder="JavaScript, React, Node.js" />
          </label>
          <label>Experience
            <textarea name="experience" rows="6" placeholder="Software Engineer - Built..."></textarea>
          </label>
          <div class="actions">
            <button type="submit">Update Preview</button>
            <button type="button" id="download-btn">Download as Text</button>
          </div>
        </form>
      </section>

      <section class="preview" id="preview">
        <h2 id="p-name">Your Name</h2>
        <p id="p-contact"></p>

        <h3>Professional Summary</h3>
        <p id="p-summary">Add your summary in the form.</p>

        <h3>Skills</h3>
        <ul id="p-skills">
          <li>Add skills to get started.</li>
        </ul>

        <h3>Experience</h3>
        <pre id="p-experience">Add your experience in the form.</pre>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
